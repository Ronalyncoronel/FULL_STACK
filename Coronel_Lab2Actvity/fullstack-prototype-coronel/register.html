<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Full Stack App (Student Build)</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="container-fluid">
        <div class="nav">
            <h2>Full-Stack App (Ronalyn Coronel)</h2>

            <div class="nav-btn">
                <a href="login.html" class="login-btn">Login</a>
                <a href="register.html" class="register-btn">Register</a>
            </div>
    </div>
</div>

<main>
    <section id="register">
       <form class="register-card">
            <h1>Register</h1>
                <div class="form-group">
                    <label for="text">First Name</label>
                    <input type="text" id="firstname" placeholder="First Name" required>
                    
                    <label for="text">Last Name</label>
                    <input type="text" id="lastname" placeholder="Last Name" required>

                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Email" required>

                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Password" required>

                    <button type="submit" class="btn btn-register">Sign Up</button>
                    <a href="index.html" class="btn btn-cancel">Cancel</a>
                </div>
       </form> 
    </section>
</main>
    <script src="script.js"></script>
</body>
</html>
